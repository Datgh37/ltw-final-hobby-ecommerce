# version: '3.8'

services:
  # Dịch vụ 1: SQL Server
  hobbyshop-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql_server
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SQL_PASSWORD}
    ports:
      - "1433:1433" # Mở cổng để bạn có thể dùng SSMS kết nối từ máy thật vào
    volumes:
      - sql_data:/var/opt/mssql # Lưu dữ liệu vào ổ đĩa ảo của Docker

  # Dịch vụ 2: Website ASP.NET MVC
  hobbyshop-web:
    build: .
    container_name: aspnet_web_app
    env_file:
      - .env
    ports:
      - "8080:8080" # Truy cập localhost:8080 trên máy thật để kiểm tra
    depends_on:
      - hobbyshop-db # Đợi database khởi động xong mới chạy web

  # Dịch vụ 3: Cloudflare Tunnel
  cf-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare_tunnel
    restart: always
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TOKEN}

volumes:
  sql_data: